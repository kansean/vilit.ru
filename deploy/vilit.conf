# Nginx конфигурация для vilit.ru
# Файл: /etc/nginx/sites-available/vilit.ru.conf

# Редирект www → без www
server {
    listen 80;
    server_name www.vilit.ru;
    return 301 https://vilit.ru$request_uri;
}

server {
    listen 80;
    server_name vilit.ru;

    # После установки SSL certbot автоматически добавит редирект на 443

    # Статические файлы — отдаём напрямую через nginx
    location /fonts/ {
        alias /var/www/vilit.ru/dist/client/fonts/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        alias /var/www/vilit.ru/dist/client/images/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /favicon.svg {
        alias /var/www/vilit.ru/dist/client/favicon.svg;
        expires 30d;
        access_log off;
    }

    location /robots.txt {
        alias /var/www/vilit.ru/dist/client/robots.txt;
        expires 1d;
        access_log off;
    }

    location /sitemap-index.xml {
        alias /var/www/vilit.ru/dist/client/sitemap-index.xml;
        expires 1d;
        access_log off;
    }

    # Astro assets (с хешами в имени — кешировать навсегда)
    location /_astro/ {
        alias /var/www/vilit.ru/dist/client/_astro/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Всё остальное — проксируем на Node.js (Astro SSR)
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Запрет доступа к служебным файлам
    location ~ /\. {
        deny all;
    }

    location ~ ^/(data|deploy|scripts|src|node_modules)/ {
        deny all;
    }
}
